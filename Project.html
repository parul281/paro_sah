<html lang = "en">
  <head>
	<title>Currency Converter</title>
	<link rel="stylesheet" href="Project.css">
	<link
		rel="stylesheet" 
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 													integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
		crossorigin="anonymous" 
		referrerpolicy="no-referrer" 
	/>
  </head>

  <body>

	<div class="container">
		<h2>Currency Converter</h2>
		<form>
			<div class="amount">
				<p>Enter Amount</p>
				<input value="1" type="text">
			</div>
	
			<div class="dropdown">
				<div class="form">
					<p>From</p>
					<div class="select-container">
						<img src="https://flagsapi.com/US/flat/64.png">
						<select name="from"></select>
					</div>
				</div>
				<i class="fa-solid fa-arrow-right-arrow-left"></i>
				<div class="to">
					<p>To</p>
					<div class="select-container">
						<img src="https://flagsapi.com/IN/flat/64.png">
						<select name="to"></select>
					</div>
				</div>
			</div>
			<div class="msg">1USD = 80INR</div>
			<button>Get Exchange Rate</button>
		</form>
	</div>


	<script src="codes.js"></script>
	<script src="Project.js"></script>

  </body>
</html>
